# Netlify — site statique brut (aucune build command : le HTML est commité tel quel).
# Headers de cache. Les fichiers ne sont PAS fingerprintés → on n'immutabilise QUE les
# assets stables (fonts, images, libs vendor). Le CSS/JS applicatif change à chaque build :
# revalidation systématique pour éviter de servir une version périmée.

[build]
  publish = "."

# --- Assets stables : cache long immutable (1 an) ---
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- CSS / JS applicatif : revalidation (peut changer à chaque build) ---
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/main.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
