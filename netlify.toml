# Netlify — site statique brut (aucune build command : le HTML est commité tel quel).
# Headers de cache. Les fichiers ne sont PAS fingerprintés → on n'immutabilise QUE les
# assets stables (fonts, images, libs vendor). Le CSS/JS applicatif change à chaque build :
# revalidation systématique pour éviter de servir une version périmée.

[build]
  publish = "."

# Netlify Functions (module Actualités, lecture seule)
[functions]
  directory = "netlify/functions"

# --- En-têtes de sécurité (tout le site) ---
# CSP : scripts/polices/images en local uniquement. Pas de 'unsafe-inline' sur les scripts
# (le JS inline a été retiré). 'unsafe-inline' reste sur les styles (attributs style="…" du HTML).
# data: pour img = grain + flèche du select en SVG inline ; form-action self = Netlify Forms.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; frame-src 'self'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"

# --- Admin : jamais indexé (en plus du meta robots noindex de la page) ---
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# --- Assets stables : cache long immutable (1 an) ---
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- CSS / JS applicatif : revalidation (peut changer à chaque build) ---
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/main.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
