<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preload" href="/assets/fonts/pst-regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/david-light.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/admin.css">
{{ADMIN_CONFIG}}
</head><body>
<main class="admin">
  <header class="admin-top">
    <span class="admin-brand">{{BRAND}} <span class="admin-tag">Admin</span></span>
    <button type="button" id="logout" class="abtn" hidden>{{LOGOUT}}</button>
  </header>

  <!-- Écran déconnecté -->
  <section id="signin" class="admin-card" hidden>
    <h1 class="admin-h1">{{H1}}</h1>
    <p class="admin-muted">{{INTRO}}</p>
    <button type="button" id="login" class="abtn abtn--primary">{{LOGIN}}</button>
  </section>

  <!-- Écran connecté (lecture seule en 2a) -->
  <section id="dash" class="admin-dash" hidden>
    <div class="admin-dhead">
      <h1 class="admin-h1">{{DASH_TITLE}}</h1>
      <span id="admin-user" class="admin-muted"></span>
    </div>
    <div id="admin-list" class="admin-list" aria-live="polite">
      <p class="admin-state">{{LOADING}}</p>
    </div>
  </section>

  <!-- Pendant l'initialisation du widget -->
  <p id="admin-boot" class="admin-state admin-boot">{{LOADING}}</p>
</main>
<script src="/assets/js/vendor/netlify-identity-widget.js"></script>
<script src="/assets/js/admin.js"></script>
</body></html>
