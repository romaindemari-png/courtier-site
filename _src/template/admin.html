<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preload" href="/assets/fonts/pst-regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/david-light.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/admin.css">
{{ADMIN_CONFIG}}
</head><body>
<main class="admin">
  <header class="admin-top">
    <span class="admin-brand">{{BRAND}} <span class="admin-tag">Admin</span></span>
    <button type="button" id="logout" class="abtn" hidden>{{LOGOUT}}</button>
  </header>

  <!-- Écran déconnecté -->
  <section id="signin" class="admin-card" hidden>
    <h1 class="admin-h1">{{H1}}</h1>
    <p class="admin-muted">{{INTRO}}</p>
    <button type="button" id="login" class="abtn abtn--primary">{{LOGIN}}</button>
  </section>

  <!-- Écran connecté -->
  <section id="dash" class="admin-dash" hidden>
    <div class="admin-dhead">
      <h1 class="admin-h1">{{DASH_TITLE}}</h1>
      <span id="admin-user" class="admin-muted"></span>
    </div>

    <form id="actu-form" class="admin-form" novalidate>
      <p class="admin-legend">{{FORM_LEGEND}}</p>
      <input type="hidden" id="f-id">
      <div class="admin-frow">
        <label class="admin-field"><span>{{FORM_DATE}}</span><input type="date" id="f-date" required></label>
        <label class="admin-field"><span>{{FORM_TYPE}}</span><select id="f-type" required>{{TYPE_OPTIONS}}</select></label>
      </div>
      <label class="admin-field"><span>{{FORM_TITRE}}</span><input type="text" id="f-titre" maxlength="140" required></label>
      <label class="admin-field"><span>{{FORM_CORPS}}</span><textarea id="f-corps" maxlength="600" rows="4"></textarea></label>
      <label class="admin-field"><span>{{FORM_LIEN}}</span><input type="url" id="f-lien" placeholder="https://…"></label>
      <div class="admin-frow admin-checks">
        <label class="admin-check"><input type="checkbox" id="f-epingle"> {{FORM_EPINGLE}}</label>
        <label class="admin-check"><input type="checkbox" id="f-publie"> {{FORM_PUBLIE}}</label>
      </div>
      <div class="admin-factions">
        <button type="submit" class="abtn abtn--primary" id="f-save">{{SAVE}}</button>
        <button type="button" class="abtn" id="f-cancel" hidden>{{CANCEL}}</button>
        <span class="admin-formmsg" id="f-msg" role="status" aria-live="polite"></span>
      </div>
    </form>

    <h2 class="admin-listtitle">{{LIST_TITLE}}</h2>
    <div id="admin-list" class="admin-list" aria-live="polite">
      <p class="admin-state">{{LOADING}}</p>
    </div>
  </section>

  <!-- Pendant l'initialisation du widget -->
  <p id="admin-boot" class="admin-state admin-boot">{{LOADING}}</p>
  <p class="admin-hint">{{ADBLOCK_HINT}}</p>
</main>
<script src="/assets/js/vendor/netlify-identity-widget.js"></script>
<script src="/assets/js/admin.js"></script>
</body></html>
